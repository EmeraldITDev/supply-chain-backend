; Per-directory PHP overrides honored by Apache + mod_php.
; These raise the limits that were silently dropping vendor registration
; uploads. The deployed defaults were post_max_size=8M, upload_max_filesize=2M,
; max_execution_time=30 and memory_limit=128M which is why large multi-file
; vendor registrations failed even though curl with a single small payload
; succeeded.

upload_max_filesize = 50M
post_max_size = 100M
memory_limit = 512M
max_execution_time = 180
max_input_time = 180

; Make sure PHP does not flush a partial response on fatal errors before
; CORS headers are appended via the shutdown handler. (max_file_uploads is
; PHP_INI_SYSTEM and is bumped from the Dockerfile's php.ini instead.)
output_buffering = 4096
implicit_flush = Off
