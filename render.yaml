services:
  - type: web
    name: supply-chain-backend
    env: php
    buildCommand: |
      composer install --no-dev --optimize-autoloader
      php artisan storage:link || true
      php artisan config:clear
      php artisan route:clear
      php artisan cache:clear || true
      php artisan migrate --force
    startCommand: php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: DB_CONNECTION
        value: pgsql
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_DRIVER
        value: database
      - key: MAIL_MAILER
        value: log
      - key: QUEUE_CONNECTION
        value: sync
      - key: FRONTEND_URL
        value: https://emerald-supply-chain.vercel.app
      - key: DOCUMENTS_DISK
        value: public
      - key: QUOTATION_ATTACHMENTS_DISK
        value: s3

